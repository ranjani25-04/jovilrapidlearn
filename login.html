<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Register - JovilRapidLearn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a2540, #1e3c72);
    }

    .container {
      width: 380px;
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .title {
      text-align: center;
      margin-bottom: 25px;
      font-size: 24px;
      font-weight: 600;
      color: #0a2540;
    }

    .tabs {
      display: flex;
      margin-bottom: 25px;
    }

    .tabs label {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: 500;
      color: #555;
      border-bottom: 2px solid #ddd;
      transition: 0.3s;
    }

    input[type="radio"] {
      display: none;
    }

    #login:checked ~ .tabs label[for="login"],
    #register:checked ~ .tabs label[for="register"] {
      color: #0a2540;
      border-bottom: 3px solid #4fd1c5;
    }

    .form {
      display: none;
      animation: fade 0.5s ease;
    }

    #login:checked ~ .login-form,
    #register:checked ~ .register-form {
      display: block;
    }

    .form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .form input:focus {
      outline: none;
      border-color: #4fd1c5;
    }

    .form button {
      width: 100%;
      padding: 12px;
      background: #0a2540;
      border: none;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .form button:hover {
      background: #1e3c72;
    }

    .form p {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #666;
    }

    .form p span {
      color: #4fd1c5;
      font-weight: 500;
      cursor: pointer;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="title">JovilRapidLearn</div>

    <!-- Login Form -->
    <div class="form login-form">
      <form method="POST">
  <input type="hidden" name="action" value="login">
  <input type="email" name="email" required>
  <input type="password" name="password" required>
  <input type="radio" name="role" value="student" required> Student
  <input type="radio" name="role" value="admin"> Admin
  <button>Login</button>
</form>
      <p>Don't have an account? <span onclick="document.getElementById('register').checked=true">Register</span></p>
      
    </div>

    <!-- Register Form -->
    <div class="form register-form">
    
    <form method="POST">
  <input type="hidden" name="action" value="register">
  <input type="text" name="name" required>
  <input type="email" name="email" required>
  <input type="password" name="password" required>
  <input type="radio" name="role" value="student" required> Student
  <input type="radio" name="role" value="admin"> Admin
    <button>Create Account</button>
</form>

      <p>Already have an account? <span onclick="document.getElementById('login').checked=true">Login</span></p>
    </div>

  </div>

</body>
</html>
